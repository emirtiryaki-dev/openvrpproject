<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Open VRP Web Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .upload-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 500px; width: 100%; }
    </style>
</head>
<body>
    <div class="upload-card">
        <h2 class="fw-bold mb-3 text-primary">🚀 OPEN VRP WEB</h2>
        <p class="text-muted mb-4">Lütfen rotalanacak verilerinizi içeren Excel veri setinizi yükleyin.</p>
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" class="form-control mb-3" accept=".xlsx, .xls" required>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Rotaları Optimize Et ve Çöz</button>
        </form>
    </div>
</body>
</html>
